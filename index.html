<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Trip Splitter Ultimate</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class', theme: { extend: { colors: { gray: { 850: '#1f2937' } } } } }
  </script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    // 🟢 นำเข้าฟังก์ชัน updateProfile เพื่อใช้อัปเดตรูปโปรไฟล์ 🟢
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged, signInAnonymously, updateProfile } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, onSnapshot, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    window.FirebaseAPI = { 
        initializeApp, getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged, signInAnonymously, updateProfile,
        getFirestore, collection, doc, setDoc, onSnapshot, getDoc, deleteDoc
    };
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Kanit:wght@300;400;500;600&display=swap');
    body { -webkit-tap-highlight-color: transparent; font-family: 'Kanit', 'Inter', sans-serif; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 24px); }
    .fade-in { animation: fadeIn 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .material-symbols-rounded { font-variation-settings: 'wght' 400, 'GRAD' 0, 'opsz' 24; display: inline-flex; align-items: center; justify-content: center; line-height: 1; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .dark ::-webkit-scrollbar-thumb { background: #475569; }

    .input-pro { @apply w-full border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 bg-white dark:bg-slate-800 text-slate-900 dark:text-white outline-none focus:border-blue-500 dark:focus:border-blue-400 focus:ring-4 focus:ring-blue-500/10 transition-all; }
    .btn-primary { @apply bg-blue-600 hover:bg-blue-700 dark:bg-blue-500 dark:hover:bg-blue-600 text-white rounded-xl px-5 py-3 font-medium transition-all flex items-center justify-center gap-2 disabled:opacity-50 disabled:pointer-events-none; }
    .btn-secondary { @apply bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-white rounded-xl px-5 py-3 font-medium hover:bg-slate-50 dark:hover:bg-slate-700 transition-all flex items-center justify-center gap-2; }
    .card-pro { @apply bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700/50 rounded-2xl p-4 md:p-5 shadow-sm hover:shadow-md transition-all; }
    
    .bg-grid-pattern { background-image: radial-gradient(circle at 1px 1px, #e2e8f0 1px, transparent 0); background-size: 24px 24px; }
    .dark .bg-grid-pattern { background-image: radial-gradient(circle at 1px 1px, #334155 1px, transparent 0); }
  </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 transition-colors duration-300">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useRef, useEffect } = React;

    const MY_FIREBASE_CONFIG = {
      apiKey: "AIzaSyAJHxPDdgl8PH9dswfWvB9g0WGaHVNrlOc",
      authDomain: "trip-web-41cea.firebaseapp.com",
      projectId: "trip-web-41cea",
      storageBucket: "trip-web-41cea.firebasestorage.app",
      messagingSenderId: "904326717224",
      appId: "1:904326717224:web:6bf662c01a8e6b49cd3a1d"
    };

    const iconMap = {
        'wallet': 'account_balance_wallet', 'pie-chart': 'pie_chart', 'receipt': 'receipt_long', 'users': 'group',
        'plus': 'add', 'x': 'close', 'trash-2': 'delete', 'check': 'check', 'check-circle-2': 'check_circle',
        'arrow-right': 'arrow_forward', 'arrow-left': 'arrow_back', 'copy': 'content_copy', 'loader': 'progress_activity',
        'alert-triangle': 'warning', 'qr': 'qr_code_scanner', 'edit': 'edit', 'dark-mode': 'dark_mode', 'light-mode': 'light_mode', 
        'filter': 'filter_alt', 'image': 'image', 'camera': 'photo_camera', 'share': 'share', 'logout': 'logout', 'login': 'login', 
        'person_add': 'person_add', 'person': 'person', 'lock': 'lock', 'flight': 'flight_takeoff'
    };

    const CATEGORIES = {
        food: { id: 'food', label: 'อาหาร/เครื่องดื่ม', icon: 'restaurant', color: 'text-orange-500 bg-orange-100 dark:bg-orange-500/20' },
        transport: { id: 'transport', label: 'เดินทาง', icon: 'directions_car', color: 'text-blue-500 bg-blue-100 dark:bg-blue-500/20' },
        hotel: { id: 'hotel', label: 'ที่พัก', icon: 'hotel', color: 'text-purple-500 bg-purple-100 dark:bg-purple-500/20' },
        shopping: { id: 'shopping', label: 'ช้อปปิ้ง', icon: 'shopping_bag', color: 'text-pink-500 bg-pink-100 dark:bg-pink-500/20' },
        activity: { id: 'activity', label: 'ตั๋ว/กิจกรรม', icon: 'local_activity', color: 'text-emerald-500 bg-emerald-100 dark:bg-emerald-500/20' },
        other: { id: 'other', label: 'อื่นๆ', icon: 'category', color: 'text-slate-500 bg-slate-100 dark:bg-slate-500/20' }
    };

    // เซ็ตอิโมจิให้เลือก
    const AVATARS = ['🐶', '🐱', '🦊', '🐻', '🐼', '🐰', '🐯', '🐸', '🐷', '🐵', '👽', '🦄'];

    const Icon = ({ name, className = "", filled = false }) => {
        let fSize = 'inherit';
        if(className.includes('w-3')) fSize = '12px'; if(className.includes('w-4')) fSize = '16px';
        if(className.includes('w-5')) fSize = '20px'; if(className.includes('w-6')) fSize = '24px';
        if(className.includes('w-8')) fSize = '32px'; if(className.includes('w-12')) fSize = '48px';
        return <span className={`material-symbols-rounded ${className}`} style={{ fontSize: className.includes('text-') ? undefined : fSize, fontVariationSettings: filled ? "'FILL' 1" : "'FILL' 0" }}>{iconMap[name] || name}</span>;
    };

    const formatMoney = (amount) => new Intl.NumberFormat('th-TH', { minimumFractionDigits: 0, maximumFractionDigits: 2 }).format(amount);
    const generateId = () => Math.random().toString(36).substr(2, 9);

    function App() {
      const [darkMode, setDarkMode] = useState(() => localStorage.getItem('theme') === 'dark');
      const [appState, setAppState] = useState('loading');
      
      const [user, setUser] = useState(null);
      const [currentTripId, setCurrentTripId] = useState(null);
      const [tripsList, setTripsList] = useState([]); 
      const [tripData, setTripData] = useState({ name: '', members: [], expenses: [] });
      const [activeTab, setActiveTab] = useState('summary');
      const [viewAs, setViewAs] = useState('all');
      
      const [cloudStatus, setCloudStatus] = useState('connecting');
      const dbRef = useRef(null);
      const authRef = useRef(null);
      const unsubscribeTripRef = useRef(null);
      const unsubscribeUserRef = useRef(null);
      const fileInputRef = useRef(null); 

      const [authForm, setAuthForm] = useState({ username: '', password: '', confirmPassword: '', isRegister: false });
      const [authError, setAuthError] = useState('');
      const [isAuthLoading, setIsAuthLoading] = useState(false);
      const [selectedAvatar, setSelectedAvatar] = useState('🐶'); // กำหนดรูปเริ่มต้น

      const [isModalOpen, setIsModalOpen] = useState({ createTrip: false, expense: false, memberDetail: false, confirm: false, editMember: false, qr: false, imageViewer: false });
      const [modalData, setModalData] = useState({ expenseId: null, memberId: null, confirmType: '', confirmId: '', confirmMsg: '', qrData: null, imageUrl: null });
      
      const [tempInput, setTempInput] = useState('');
      const [memberForm, setMemberForm] = useState({ id: null, name: '', promptPay: '' });
      const [expenseForm, setExpenseForm] = useState({ id: null, title: '', amount: '', payerId: '', splitType: 'equal', splitData: {}, category: 'food', receiptUrl: null });
      const [isUploading, setIsUploading] = useState(false);

      useEffect(() => {
        if (darkMode) { document.documentElement.classList.add('dark'); localStorage.setItem('theme', 'dark'); } 
        else { document.documentElement.classList.remove('dark'); localStorage.setItem('theme', 'light'); }
      }, [darkMode]);

      useEffect(() => {
        const initFirebase = async () => {
          try {
            const app = window.FirebaseAPI.initializeApp(MY_FIREBASE_CONFIG);
            const auth = window.FirebaseAPI.getAuth(app);
            const db = window.FirebaseAPI.getFirestore(app);
            dbRef.current = db;
            authRef.current = auth;

            window.FirebaseAPI.onAuthStateChanged(auth, async (u) => { 
                const urlParams = new URLSearchParams(window.location.search);
                const joinId = urlParams.get('join');

                if (u) { 
                    setUser(u);
                    loadUserTripsList(db, u.uid);
                    
                    if (joinId) {
                        await checkInviteLink(db, u.uid, joinId);
                    } else if(appState === 'loading' || appState === 'login') {
                        setAppState('home');
                    }
                } else {
                    if (joinId) {
                        await window.FirebaseAPI.signInAnonymously(auth);
                    } else {
                        setUser(null);
                        setAppState('login');
                    }
                }
            });
          } catch (err) { setCloudStatus('error'); }
        };
        initFirebase();
        return () => { 
            if(unsubscribeTripRef.current) unsubscribeTripRef.current(); 
            if(unsubscribeUserRef.current) unsubscribeUserRef.current();
        }
      }, []);

      const checkInviteLink = async (db, uid, joinId) => {
          const snap = await window.FirebaseAPI.getDoc(window.FirebaseAPI.doc(db, 'trips', joinId));
          if (snap.exists()) {
              const tripName = snap.data().name;
              const userRef = window.FirebaseAPI.doc(db, 'user_trips', uid);
              const userSnap = await window.FirebaseAPI.getDoc(userRef);
              let currentList = userSnap.exists() ? (userSnap.data().list || []) : [];
              
              if (!currentList.find(t => t.id === joinId)) {
                  currentList = [{id: joinId, name: tripName, date: new Date().toISOString()}, ...currentList];
                  await window.FirebaseAPI.setDoc(userRef, { list: currentList });
              }
              openTrip(joinId);
          } else {
              alert("ลิงก์ทริปนี้ไม่ถูกต้องหรือถูกลบทิ้งไปแล้วครับ");
              setAppState('home');
          }
          window.history.replaceState({}, document.title, window.location.pathname);
      };

      const handleAuthSubmit = async (e) => {
          e.preventDefault();
          setAuthError('');
          
          const userStr = authForm.username.trim().toLowerCase();
          if(userStr.length < 3) { setAuthError('ชื่อผู้ใช้ต้องมีอย่างน้อย 3 ตัวอักษร'); return; }
          if(authForm.password.length < 6) { setAuthError('รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร'); return; }
          
          if(authForm.isRegister && authForm.password !== authForm.confirmPassword) {
              setAuthError('รหัสผ่านไม่ตรงกัน กรุณาพิมพ์ให้เหมือนกันทั้งสองช่องครับ'); return;
          }
          
          setIsAuthLoading(true);
          const fakeEmail = `${userStr}@tripsplit.app`;

          try {
              if (authForm.isRegister) {
                  // สมัครสมาชิก
                  const userCredential = await window.FirebaseAPI.createUserWithEmailAndPassword(authRef.current, fakeEmail, authForm.password);
                  // อัปเดตรูปโปรไฟล์ทันทีที่สมัครเสร็จ
                  await window.FirebaseAPI.updateProfile(userCredential.user, { photoURL: selectedAvatar });
              } else {
                  // เข้าสู่ระบบ
                  await window.FirebaseAPI.signInWithEmailAndPassword(authRef.current, fakeEmail, authForm.password);
              }
          } catch (err) {
              if(err.code === 'auth/email-already-in-use') setAuthError('ชื่อผู้ใช้นี้มีคนใช้งานแล้ว โปรดใช้ชื่ออื่น');
              else if(err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential') setAuthError('ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง');
              else setAuthError('เกิดข้อผิดพลาด: ' + err.message);
          } finally {
              setIsAuthLoading(false);
          }
      };

      const handleGuestLogin = async () => {
          setIsAuthLoading(true);
          try {
              await window.FirebaseAPI.signInAnonymously(authRef.current);
          } catch (err) {
              setAuthError('ไม่สามารถเข้าใช้งานแบบ Guest ได้');
              setIsAuthLoading(false);
          }
      }

      const handleLogout = () => {
          if(!authRef.current) return;
          if(confirm("ต้องการออกจากระบบใช่หรือไม่?")) {
              window.FirebaseAPI.signOut(authRef.current);
          }
      };

      const loadUserTripsList = (db, uid) => {
        if(unsubscribeUserRef.current) unsubscribeUserRef.current();
        unsubscribeUserRef.current = window.FirebaseAPI.onSnapshot(window.FirebaseAPI.doc(db, 'user_trips', uid), (docSnap) => {
          if (docSnap.exists()) setTripsList(docSnap.data().list || []);
          else window.FirebaseAPI.setDoc(window.FirebaseAPI.doc(db, 'user_trips', uid), { list: [] });
          setCloudStatus('synced');
        });
      };

      const loadTripData = (tripId) => {
        if (!dbRef.current) return;
        setCloudStatus('syncing');
        if (unsubscribeTripRef.current) unsubscribeTripRef.current();
        unsubscribeTripRef.current = window.FirebaseAPI.onSnapshot(window.FirebaseAPI.doc(dbRef.current, 'trips', tripId), (docSnap) => {
          if (docSnap.exists()) { setTripData(docSnap.data()); setViewAs('all'); }
          else { alert("ทริปนี้ถูกลบไปแล้วครับ"); goHome(); } 
          setCloudStatus('synced');
        });
      };

      const saveCurrentTripData = async (newData) => { if (dbRef.current && currentTripId) { setCloudStatus('syncing'); await window.FirebaseAPI.setDoc(window.FirebaseAPI.doc(dbRef.current, 'trips', currentTripId), newData); } };

      const handleCreateTrip = async (e) => {
        e.preventDefault(); if(!tempInput.trim() || !dbRef.current || !user) return;
        const newTripId = `trip_${Date.now()}`;
        await window.FirebaseAPI.setDoc(window.FirebaseAPI.doc(dbRef.current, 'trips', newTripId), { id: newTripId, name: tempInput.trim(), members: [], expenses: [], createdAt: new Date().toISOString() });
        await window.FirebaseAPI.setDoc(window.FirebaseAPI.doc(dbRef.current, 'user_trips', user.uid), { list: [{id: newTripId, name: tempInput.trim(), date: new Date().toISOString()}, ...tripsList] });
        closeModals(); openTrip(newTripId);
      };

      const handleDeleteTrip = async (tripId) => {
        if(!dbRef.current || !user) return;
        await window.FirebaseAPI.setDoc(window.FirebaseAPI.doc(dbRef.current, 'user_trips', user.uid), { list: tripsList.filter(t => t.id !== tripId) });
        closeConfirm();
      };

      const openTrip = (tripId) => { setCurrentTripId(tripId); setAppState('trip'); setActiveTab('summary'); loadTripData(tripId); };
      const goHome = () => { setAppState('home'); setCurrentTripId(null); if (unsubscribeTripRef.current) unsubscribeTripRef.current(); };

      const handleSaveMember = (e) => {
        e.preventDefault(); if (!memberForm.name.trim()) return;
        let newMembers = memberForm.id ? tripData.members.map(m => m.id === memberForm.id ? {...m, name: memberForm.name.trim(), promptPay: memberForm.promptPay.trim()} : m) : [...tripData.members, { id: generateId(), name: memberForm.name.trim(), promptPay: memberForm.promptPay.trim() }];
        saveCurrentTripData({ ...tripData, members: newMembers }); closeModals();
      };

      const handleDeleteMember = (memberId) => {
        const newExpenses = tripData.expenses.map(exp => { let newSplit = {...exp.splitData}; delete newSplit[memberId]; return {...exp, splitData: newSplit}; });
        saveCurrentTripData({ ...tripData, members: tripData.members.filter(m => m.id !== memberId), expenses: newExpenses }); closeConfirm();
      };

      const openExpenseModal = (exp = null) => {
        if (tripData.members.length === 0) { alert("กรุณาเพิ่มสมาชิกก่อนนะครับ"); setActiveTab('members'); return; }
        if (exp) setExpenseForm(exp);
        else { const defSplit = {}; tripData.members.forEach(m => defSplit[m.id] = true); setExpenseForm({ id: null, title: '', amount: '', payerId: tripData.members[0].id, splitType: 'equal', splitData: defSplit, category: 'food', receiptUrl: null }); }
        setIsModalOpen(p => ({...p, expense: true}));
      };

      const triggerImageUpload = () => { if (!isUploading && fileInputRef.current) fileInputRef.current.click(); };

      const handleImageUpload = (e) => {
          const file = e.target.files[0];
          if (!file) return;
          if (!file.type.startsWith('image/')) { alert('กรุณาเลือกไฟล์รูปภาพครับ'); return; }

          setIsUploading(true);
          const reader = new FileReader();
          reader.readAsDataURL(file);
          reader.onload = (event) => {
              const img = new Image();
              img.src = event.target.result;
              img.onload = () => {
                  const canvas = document.createElement('canvas');
                  const MAX_WIDTH = 600; let width = img.width; let height = img.height;
                  if (width > MAX_WIDTH) { height = Math.round((height * MAX_WIDTH) / width); width = MAX_WIDTH; }
                  canvas.width = width; canvas.height = height;
                  const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                  const compressedBase64 = canvas.toDataURL('image/jpeg', 0.5); 
                  
                  if (Math.round((compressedBase64.length * 3) / 4) > 800000) {
                      alert('รูปมีความจุเยอะเกินไปครับ ลองถ่ายใหม่หรือครอปรูปให้เล็กลงหน่อยนะครับ'); setIsUploading(false); return;
                  }
                  setExpenseForm(prev => ({...prev, receiptUrl: compressedBase64})); setIsUploading(false);
              };
          };
      };

      const handleRemoveReceipt = (e) => { e.stopPropagation(); setExpenseForm(prev => ({...prev, receiptUrl: null})); };

      const handleSaveExpense = (e) => {
        e.preventDefault(); if (!expenseForm.title || !expenseForm.amount || !expenseForm.payerId) return;
        let finalAmt = parseFloat(expenseForm.amount);
        if (expenseForm.splitType === 'custom') {
            let total = 0; Object.values(expenseForm.splitData).forEach(v => total += (parseFloat(v)||0));
            if (Math.abs(total - finalAmt) > 0.05) { alert(`ยอดแบ่ง (${formatMoney(total)}) ไม่ตรงกับยอดเต็ม (${formatMoney(finalAmt)})`); return; }
        } else if (Object.values(expenseForm.splitData).filter(v=>v).length === 0) { alert("กรุณาเลือกคนหาร"); return; }

        const newExp = { ...expenseForm, id: expenseForm.id || generateId(), amount: finalAmt, date: new Date().toISOString() };
        saveCurrentTripData({ ...tripData, expenses: expenseForm.id ? tripData.expenses.map(e => e.id === expenseForm.id ? newExp : e) : [...tripData.expenses, newExp] });
        closeModals();
      };

      const handleDeleteExpense = (expId) => { saveCurrentTripData({ ...tripData, expenses: tripData.expenses.filter(e => e.id !== expId) }); closeConfirm(); };

      const { totalCost, memberStats, settlements, categoryStats } = useMemo(() => {
        let total = 0; let stats = {}; let catStats = {}; Object.keys(CATEGORIES).forEach(k => catStats[k] = 0);
        tripData.members.forEach(m => stats[m.id] = { ...m, paid: 0, share: 0, balance: 0, details: [] });

        tripData.expenses.forEach(exp => {
            total += exp.amount; const cat = exp.category || 'other'; if(catStats[cat] !== undefined) catStats[cat] += exp.amount;
            if (stats[exp.payerId]) { stats[exp.payerId].paid += exp.amount; stats[exp.payerId].details.push({ type: 'paid', title: exp.title, amount: exp.amount }); }

            if (exp.splitType === 'equal') {
                const selected = Object.keys(exp.splitData).filter(id => exp.splitData[id]);
                if (selected.length > 0) { const sharePer = exp.amount / selected.length; selected.forEach(id => { if (stats[id]) { stats[id].share += sharePer; stats[id].details.push({ type: 'share', title: exp.title, amount: sharePer }); } }); }
            } else {
                Object.entries(exp.splitData).forEach(([id, amt]) => { const shareAmt = parseFloat(amt)||0; if (shareAmt > 0 && stats[id]) { stats[id].share += shareAmt; stats[id].details.push({ type: 'share', title: exp.title, amount: shareAmt }); } });
            }
        });

        let balancesArr = Object.values(stats).map(s => ({ ...s, balance: s.paid - s.share }));
        const debtors = balancesArr.filter(b => b.balance < -0.01).map(b => ({ ...b, amt: Math.abs(b.balance) })).sort((a,b)=>b.amt-a.amt);
        const creditors = balancesArr.filter(b => b.balance > 0.01).map(b => ({ ...b, amt: b.balance })).sort((a,b)=>b.amt-a.amt);
        
        let transfers = []; let i = 0, j = 0;
        while (i < debtors.length && j < creditors.length) {
            let amount = Math.min(debtors[i].amt, creditors[j].amt);
            transfers.push({ from: debtors[i].name, fromId: debtors[i].id, to: creditors[j].name, toId: creditors[j].id, amount });
            debtors[i].amt -= amount; creditors[j].amt -= amount;
            if (debtors[i].amt < 0.01) i++; if (creditors[j].amt < 0.01) j++;
        }
        return { totalCost: total, memberStats: balancesArr, settlements: transfers, categoryStats: Object.entries(catStats).filter(([k,v]) => v > 0).sort((a,b) => b[1] - a[1]).map(([k,v]) => ({ id:k, amount:v, ...CATEGORIES[k] })) };
      }, [tripData]);

      const closeModals = () => { setIsModalOpen({createTrip:false, expense:false, memberDetail:false, confirm:false, editMember:false, qr:false, imageViewer: false}); setTempInput(''); };
      const closeConfirm = () => { setIsModalOpen(p=>({...p, confirm: false})); setModalData(p=>({...p, confirmType:'', confirmId:'', confirmMsg:''})); };
      const askConfirm = (type, id, msg) => { setModalData(p=>({...p, confirmType: type, confirmId: id, confirmMsg: msg})); setIsModalOpen(p=>({...p, confirm:true})); }
      
      const handleShowQR = (settlement) => {
          const creditor = tripData.members.find(m => m.id === settlement.toId);
          if(creditor && creditor.promptPay) { setModalData(p=>({...p, qrData: { name: creditor.name, promptPay: creditor.promptPay, amount: settlement.amount, from: settlement.from }})); setIsModalOpen(p=>({...p, qr: true})); } 
          else { if(confirm(`${creditor.name} ยังไม่ได้ตั้งค่าพร้อมเพย์ ไปตั้งค่าตอนนี้เลยไหม?`)) { setMemberForm(creditor); setIsModalOpen(p=>({...p, editMember:true})); } }
      };

      const copySummaryToClipboard = () => {
        let text = `📝 สรุปยอดทริป: ${tripData.name}\n💰 ยอดรวม: ${formatMoney(totalCost)}\n\n`;
        if (settlements.length === 0) text += `✨ ทุกคนเคลียร์บิลหมดแล้ว!`;
        else {
            text += `💸 สรุปการโอนเงิน:\n`;
            settlements.forEach(s => {
                const creditor = tripData.members.find(m => m.id === s.toId);
                text += `- ${s.from} โอนให้ ${s.to} : ${formatMoney(s.amount)}\n`;
                if(creditor?.promptPay) text += `  (พร้อมเพย์: ${creditor.promptPay})\n`;
            });
        }
        const ta = document.createElement("textarea"); ta.value = text; document.body.appendChild(ta); ta.select();
        try { document.execCommand('copy'); alert("คัดลอกข้อความเรียบร้อย นำไปวางใน LINE ได้เลยครับ!"); } catch (e) { alert("ก๊อปปี้ไม่สำเร็จ"); }
        document.body.removeChild(ta);
      };

      const copyInviteLink = () => {
        const link = `${window.location.origin}${window.location.pathname}?join=${currentTripId}`;
        const ta = document.createElement("textarea"); ta.value = `🔗 เข้ามาร่วมแชร์ค่าใช้จ่ายทริป "${tripData.name}" ด้วยกันนะ!\n\nกดลิงก์นี้เลย: ${link}`; 
        document.body.appendChild(ta); ta.select();
        try { document.execCommand('copy'); alert("คัดลอกลิงก์เชิญเพื่อนแล้ว! ส่งเข้ากลุ่ม LINE ได้เลย 🚀"); } catch (e) { alert("ก๊อปปี้ไม่สำเร็จ"); }
        document.body.removeChild(ta);
      };

        <div className="flex items-center gap-1.5 text-[10px] font-medium px-2.5 py-1 rounded-full bg-slate-200/50 dark:bg-slate-800 text-slate-500 dark:text-slate-400">

        </div>
      );

      // --- SCREEN 0: LOADING ---
      if (appState === 'loading') {
          return <div className="min-h-screen flex items-center justify-center bg-slate-50 dark:bg-slate-900"><Icon name="loader" className="w-8 h-8 text-blue-500 animate-spin"/></div>;

      // --- SCREEN 1: LOGIN ---

                  <div className="bg-white/80 dark:bg-slate-800/80 backdrop-blur-xl p-6 sm:p-10 rounded-[2rem] shadow-2xl border border-white dark:border-slate-700/50 w-full max-w-md relative overflow-hidden">

                          <div className="w-20 h-20 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-2xl flex items-center justify-center text-white transform -rotate-3 transition-transform text-4xl">
                              {authForm.isRegister ? selectedAvatar : <Icon name="flight" className="w-10 h-10"/>}
                          </div>
                      </div>

                      <h1 className="text-3xl font-black mb-2 text-center text-slate-900 dark:text-white tracking-tight">Trip Splitter</h1>

                          {authForm.isRegister ? 'สร้างบัญชีใหม่เพื่อเริ่มทริปของคุณ' : 'เข้าสู่ระบบเพื่อจัดการทริปของคุณ'}
                      </p>
                      
                      {authError && (
                          <div className="bg-rose-50 dark:bg-rose-500/10 text-rose-600 dark:text-rose-400 text-xs p-3.5 rounded-xl mb-6 text-center border border-rose-100 dark:border-rose-900/50 font-medium flex items-center justify-center gap-2 fade-in">
                              <Icon name="alert-triangle" className="w-4 h-4 flex-shrink-0"/> <span className="text-left">{authError}</span>
                          </div>

                          </div>

                              <input type="password" value={authForm.password} onChange={e=>setAuthForm({...authForm, password: e.target.value})} placeholder="รหัสผ่าน (อย่างน้อย 6 ตัว)" className="input-pro !pl-11 bg-white/50 dark:bg-slate-900/50 border-slate-200 shadow-sm" required minLength="6" />
                          </div>

                          {authForm.isRegister && (

                                      <Icon name="check-circle-2" className="w-5 h-5"/>
                                  </div>
                                  <input type="password" value={authForm.confirmPassword} onChange={e=>setAuthForm({...authForm, confirmPassword: e.target.value})} placeholder="ยืนยันรหัสผ่านอีกครั้ง" className="input-pro !pl-11 bg-white/50 dark:bg-slate-900/50 border-slate-200 shadow-sm" required minLength="6" />
                              </div>
                          )}

                                  {authForm.isRegister ? 'เข้าสู่ระบบเลย' : 'สร้างบัญชีใหม่'}
                              </button>
                          </p>
                      </div>
                  </div>
              </div>

        const isGuest = user && user.isAnonymous;

              <div>
                  <h1 className="text-3xl font-bold tracking-tight">ทริปของฉัน</h1>
                  <div className="flex items-center gap-2 mt-2">
                      <div className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold shadow-sm ${!isEmoji && !isGuest ? 'bg-gradient-to-br from-blue-500 to-indigo-600 text-white' : 'bg-slate-200 dark:bg-slate-700 text-xl'}`}>
                          {avatarDisplay}
                      </div>
                      <p className="text-slate-600 dark:text-slate-300 font-medium truncate max-w-[120px]">
                          {isGuest ? displayUsername : `คุณ ${displayUsername}`}
                      </p>
                      <button onClick={handleLogout} className="text-xs text-rose-500 hover:text-rose-600 bg-rose-50 dark:bg-rose-500/10 px-2 py-1 rounded-md ml-1 font-medium transition-colors">ออกจากระบบ</button>
                  </div>
              </div>
              <div className="flex flex-col items-end gap-3">
                  <button onClick={()=>setDarkMode(!darkMode)} className="p-2 bg-slate-200/50 dark:bg-slate-800 rounded-full text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors"><Icon name={darkMode?'light-mode':'dark-mode'} className="w-5 h-5"/></button>
                  <CloudIndicator />
              </div>
            </header>

            <main className="px-6 py-6 space-y-4">
                <button onClick={()=>{setTempInput(''); setIsModalOpen(p=>({...p, createTrip:true}))}} className="w-full flex flex-col items-center justify-center py-10 rounded-2xl border-2 border-dashed border-slate-300 dark:border-slate-700 text-slate-500 dark:text-slate-400 hover:bg-blue-50 dark:hover:bg-blue-500/10 hover:border-blue-300 transition-colors">
                    <div className="w-12 h-12 bg-white dark:bg-slate-800 rounded-full shadow-sm flex items-center justify-center mb-3 text-blue-600"><Icon name="plus" className="w-6 h-6"/></div>
                    <span className="font-medium text-slate-700 dark:text-slate-300">สร้างทริปใหม่</span>
                </button>

                <div className="space-y-3 mt-8">
                    <h2 className="text-sm font-semibold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-4">ทริปที่เข้าร่วม</h2>
                    {tripsList.length === 0 ? <p className="text-slate-400 text-center py-8 bg-slate-100/50 dark:bg-slate-800/50 rounded-2xl border border-dashed border-slate-200 dark:border-slate-700">คุณยังไม่มีทริปเลย</p> : 
                        tripsList.map(trip => (
                            <div key={trip.id} className="card-pro flex items-center justify-between cursor-pointer group" onClick={()=>openTrip(trip.id)}>
                                <div className="flex items-center gap-4">
                                    <div className="w-12 h-12 rounded-2xl bg-gradient-to-br from-blue-500 to-indigo-600 text-white flex items-center justify-center shadow-inner"><Icon name="wallet"/></div>
                                    <div><h3 className="font-semibold text-lg leading-tight">{trip.name}</h3><p className="text-xs text-slate-400 mt-1">{new Date(trip.date).toLocaleDateString('th-TH')}</p></div>
                                </div>
                                <div className="flex items-center gap-2">
                                    <button onClick={(e)=>{e.stopPropagation(); askConfirm('trip', trip.id, `ลบทริป "${trip.name}" ออกจากหน้าของคุณใช่ไหม? (ข้อมูลในทริปจะยังอยู่สำหรับเพื่อนคนอื่น)`)}} className="p-2 text-slate-300 dark:text-slate-600 hover:text-rose-500 dark:hover:text-rose-400 rounded-full opacity-0 group-hover:opacity-100 transition-all"><Icon name="trash-2" className="w-5 h-5"/></button>
                                </div>
                            </div>
                        ))
                    }
                </div>
            </main>

            {isModalOpen.createTrip && (
                <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-end md:items-center justify-center fade-in" onClick={closeModals}>
                    <div className="bg-white dark:bg-slate-900 w-full max-w-md md:rounded-3xl rounded-t-3xl p-6 slide-up" onClick={e=>e.stopPropagation()}>
                        <div className="flex justify-between items-center mb-6"><h3 className="text-xl font-bold">สร้างทริปใหม่</h3><button onClick={closeModals} className="p-2 bg-slate-100 dark:bg-slate-800 rounded-full hover:bg-slate-200 transition-colors"><Icon name="x" className="w-5 h-5"/></button></div>
                        <form onSubmit={handleCreateTrip}>
                            <input autoFocus value={tempInput} onChange={e=>setTempInput(e.target.value)} placeholder="ตั้งชื่อทริป..." className="input-pro text-lg mb-6" />
                            <button type="submit" disabled={!tempInput.trim()} className="w-full btn-primary py-4 text-lg">เริ่มทริปเลย!</button>
                        </form>
                    </div>
                </div>
            )}
            
            {isModalOpen.confirm && (
                <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-[60] flex items-center justify-center fade-in px-4">
                    <div className="bg-white dark:bg-slate-900 w-full max-w-sm rounded-3xl p-6 text-center slide-up border border-slate-200 dark:border-slate-800 shadow-2xl">
                        <div className="w-16 h-16 bg-rose-50 dark:bg-rose-500/10 text-rose-500 rounded-full flex items-center justify-center mx-auto mb-4"><Icon name="alert-triangle" className="w-8 h-8"/></div>
                        <h3 className="text-lg font-bold mb-2">ยืนยันการลบ</h3><p className="text-slate-500 dark:text-slate-400 text-sm mb-6">{modalData.confirmMsg}</p>
                        <div className="flex gap-3">
                            <button onClick={closeConfirm} className="flex-1 btn-secondary">ยกเลิก</button>
                            <button onClick={()=>{ if(modalData.confirmType==='trip') handleDeleteTrip(modalData.confirmId); else if(modalData.confirmType==='member') handleDeleteMember(modalData.confirmId); else if(modalData.confirmType==='expense') handleDeleteExpense(modalData.confirmId); }} className="flex-1 bg-rose-500 text-white font-medium rounded-xl hover:bg-rose-600">ลบทิ้ง</button>

                    </div>
                </div>
            )}
          </div>
        );
      }

      // --- SCREEN 3: TRIP DETAILS ---
      const filteredSettlements = settlements.filter(s => viewAs === 'all' || s.fromId === viewAs || s.toId === viewAs);

      return (
        <div className="min-h-screen pb-24 fade-in">
          <header className="px-4 pt-6 pb-4 sticky top-0 bg-slate-50/90 dark:bg-slate-900/90 backdrop-blur-md z-30 border-b border-slate-200 dark:border-slate-800">

                <div className="flex items-center gap-3">
                    <button onClick={goHome} className="p-2 -ml-2 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors"><Icon name="arrow-left"/></button>
                    <div><h1 className="text-xl font-bold truncate max-w-[160px] md:max-w-xs">{tripData.name}</h1><p className="text-xs text-slate-500">{tripData.members.length} คน • {formatMoney(totalCost)} ฿</p></div>

                <div className="flex items-center gap-2">
                    <button onClick={copyInviteLink} className="p-2 bg-blue-100 text-blue-600 dark:bg-blue-500/20 dark:text-blue-400 rounded-full hover:bg-blue-200 transition-colors flex items-center gap-1 pl-3 pr-4"><Icon name="share" className="w-4 h-4"/><span className="text-xs font-bold hidden sm:inline">ชวนเพื่อน</span></button>
                    <CloudIndicator />

            <div className="max-w-2xl mx-auto hidden md:flex gap-2">
                {[{id:'summary', icon:'pie-chart', label:'สรุปยอด'}, {id:'expenses', icon:'receipt', label:'รายการ'}, {id:'members', icon:'users', label:'สมาชิก'}].map(t => (
                    <button key={t.id} onClick={()=>setActiveTab(t.id)} className={`flex-1 py-3 px-4 rounded-xl text-sm font-medium flex items-center justify-center gap-2 transition-colors ${activeTab===t.id ? 'bg-blue-600 text-white shadow-md shadow-blue-600/20' : 'bg-slate-200/50 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-200'}`}>
                        <Icon name={t.icon} className="w-4 h-4"/> {t.label}
                    </button>
                ))}
            </div>
          </header>

          <main className="max-w-2xl mx-auto px-4 py-6">
            
            {/* TAB: SUMMARY */}

                    {tripData.members.length > 0 && (

                            <select value={viewAs} onChange={e=>setViewAs(e.target.value)} className="bg-transparent font-medium w-full outline-none py-1 dark:bg-slate-800">
                                <option value="all">ดูมุมมอง: ภาพรวมทุกคน</option>
                                {tripData.members.map(m => <option key={m.id} value={m.id}>ดูมุมมอง: {m.name}</option>)}
                            </select>
                        </div>
                    )}

                    {categoryStats.length > 0 && viewAs === 'all' && (
                        <section>
                            <h2 className="text-lg font-bold mb-4">สัดส่วนค่าใช้จ่าย</h2>
                            <div className="card-pro space-y-4">
                                <div className="flex h-3 rounded-full overflow-hidden">
                                    {categoryStats.map(c => <div key={c.id} style={{width: `${(c.amount/totalCost)*100}%`}} className={`${c.color.split(' ')[0].replace('text-','bg-')} dark:brightness-110 border-r border-white/20 last:border-0`}></div>)}
                                </div>
                                <div className="grid grid-cols-2 gap-y-3 gap-x-2 text-sm">
                                    {categoryStats.map(c => (
                                        <div key={c.id} className="flex items-center justify-between">

                                            <span className="font-semibold">{Math.round((c.amount/totalCost)*100)}%</span>
                                        </div>

                                </div>
                            </div>

                                              <div key={m.id} className="flex items-center gap-3 p-2 bg-slate-50 dark:bg-slate-800/50 rounded-xl border border-slate-100 dark:border-slate-800">

                                                  <input type="number" min="0" step="0.01" placeholder="ยอดเงิน" className="input-pro !py-2.5 flex-1 text-right font-medium" value={expenseForm.splitData[m.id] || ''} onChange={(e)=>setExpenseForm(p => ({...p, splitData: {...p.splitData, [m.id]: e.target.value}}))} />
                                              </div>
                                          );
                                      }
                                  })}
                              </div>
                          </div>
                      </div>
                      <div className="p-5 border-t border-slate-100 dark:border-slate-800 bg-white dark:bg-slate-900 shadow-[0_-4px_20px_rgba(0,0,0,0.05)] z-10">
                          <button onClick={handleSaveExpense} disabled={!expenseForm.title || !expenseForm.amount || isUploading} className="w-full btn-primary py-4 text-lg">
                              {isUploading ? 'กำลังบีบอัดรูปภาพ...' : 'บันทึกบิลนี้'}
                          </button>
                      </div>
                  </div>
              </div>
          )}

          {/* Image Viewer Modal */}
          {isModalOpen.imageViewer && modalData.imageUrl && (
            <div className="fixed inset-0 bg-black/95 backdrop-blur-md z-[90] flex flex-col items-center justify-center fade-in" onClick={()=>setIsModalOpen(p=>({...p, imageViewer: false}))}>
                <div className="absolute top-6 right-6 z-[100]"><button className="p-3 bg-white/10 text-white hover:bg-white/20 rounded-full backdrop-blur-md transition-colors"><Icon name="x" className="w-6 h-6"/></button></div>
                <img src={modalData.imageUrl} alt="Receipt Full" className="w-full max-h-[90vh] object-contain px-4" onClick={e=>e.stopPropagation()} />
            </div>
          )}

          {/* Confirm Modal */}
          {isModalOpen.confirm && (
            <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-[70] flex items-center justify-center fade-in px-4">
                <div className="bg-white dark:bg-slate-900 w-full max-w-sm rounded-3xl p-6 text-center slide-up border border-slate-200 dark:border-slate-800">
                    <div className="w-16 h-16 bg-rose-50 dark:bg-rose-500/10 text-rose-500 rounded-full flex items-center justify-center mx-auto mb-4"><Icon name="alert-triangle" className="w-8 h-8"/></div>
                    <h3 className="text-lg font-bold mb-2">ยืนยันการลบ</h3><p className="text-slate-500 dark:text-slate-400 text-sm mb-6">{modalData.confirmMsg}</p>
                    <div className="flex gap-3">
                        <button onClick={closeConfirm} className="flex-1 btn-secondary">ยกเลิก</button>
                        <button onClick={()=>{ if(modalData.confirmType==='trip') handleDeleteTrip(modalData.confirmId); else if(modalData.confirmType==='member') handleDeleteMember(modalData.confirmId); else if(modalData.confirmType==='expense') handleDeleteExpense(modalData.confirmId); }} className="flex-1 bg-rose-500 text-white font-medium rounded-xl hover:bg-rose-600">ลบทิ้ง</button>
                    </div>
                </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
