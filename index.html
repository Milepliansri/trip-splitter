<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Trip Splitter - แอปแชร์ค่าใช้จ่าย</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/lucide-static@0.344.0/font/lucide.min.css" rel="stylesheet">

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    window.FirebaseAPI = {
      initializeApp, getAuth, signInAnonymously, onAuthStateChanged,
      getFirestore, doc, setDoc, onSnapshot
    };
  </script>

  <style>
    body { background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
    .fade-in { animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .icon { display: inline-block; width: 1.25em; height: 1.25em; stroke-width: 0; stroke: currentColor; fill: currentColor; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useRef, useEffect } = React;

    // ==========================================
    // 🟢 เอาโค้ดที่ก๊อปปี้มา วางใส่ตรงกลางระหว่างปีกกานี้เลยครับ 🟢
    // ==========================================
    const MY_FIREBASE_CONFIG = {

  apiKey: "AIzaSyAJHxPDdgl8PH9dswfWvB9g0WGaHVNrlOc",
  authDomain: "trip-web-41cea.firebaseapp.com",
  projectId: "trip-web-41cea",
  storageBucket: "trip-web-41cea.firebasestorage.app",
  messagingSenderId: "904326717224",
  appId: "1:904326717224:web:6bf662c01a8e6b49cd3a1d",
  measurementId: "G-2CCH6ZGR9Y"};

    };
    // ==========================================

    const Icon = ({ name, className = "" }) => <i className={`icon lucide-${name} ${className}`}></i>;

    function App() {
      const [activeTab, setActiveTab] = useState('members'); 
      const [tripName, setTripName] = useState('ทริปใหม่ของฉัน');
      const [isEditingTripName, setIsEditingTripName] = useState(false);
      const tripNameInputRef = useRef(null);

      const [user, setUser] = useState(null);
      const [isSyncing, setIsSyncing] = useState(true);
      const [cloudStatus, setCloudStatus] = useState('offline');

      const [isExpenseModalOpen, setIsExpenseModalOpen] = useState(false);
      const [selectedMemberDetail, setSelectedMemberDetail] = useState(null);
      const [confirmDialog, setConfirmDialog] = useState({ isOpen: false, type: '', id: '', message: '' });

      const [members, setMembers] = useState([]);
      const [expenses, setExpenses] = useState([]);

      const [newExpense, setNewExpense] = useState({ title: '', amount: '', payerId: '', splitBetween: [] });
      const [newMemberName, setNewMemberName] = useState('');

      const dbRef = useRef(null);
      const myAppId = 'my-trip-splitter-v1';

      useEffect(() => {
        const setupFirebase = async () => {
            if (window.FirebaseAPI && Object.keys(MY_FIREBASE_CONFIG).length > 0) {
                setCloudStatus('connecting');
                try {
                    const app = window.FirebaseAPI.initializeApp(MY_FIREBASE_CONFIG);
                    const auth = window.FirebaseAPI.getAuth(app);
                    const db = window.FirebaseAPI.getFirestore(app);
                    dbRef.current = db;

                    await window.FirebaseAPI.signInAnonymously(auth);
                    
                    window.FirebaseAPI.onAuthStateChanged(auth, (u) => {
                        setUser(u);
                        if(u) listenToData(db);
                    });
                } catch (error) {
                    console.error("Firebase Error:", error);
                    setCloudStatus('error');
                    setIsSyncing(false);
                }
            } else {
                setCloudStatus('offline');
                setIsSyncing(false);
                
                const savedData = localStorage.getItem('tripData');
                if(savedData) {
                    try {
                        const parsed = JSON.parse(savedData);
                        if(parsed.members) setMembers(parsed.members);
                        if(parsed.expenses) setExpenses(parsed.expenses);
                        if(parsed.tripName) setTripName(parsed.tripName);
                    } catch(e){}
                }
            }
        };
        setTimeout(setupFirebase, 800);
      }, []);

      const listenToData = (db) => {
        const docRef = window.FirebaseAPI.doc(db, 'trips', myAppId);
        window.FirebaseAPI.onSnapshot(docRef, (docSnap) => {
          if (docSnap.exists()) {
            const data = docSnap.data();
            setMembers(data.members || []);
            setExpenses(data.expenses || []);
            if (data.tripName) setTripName(data.tripName);
          }
          setCloudStatus('synced');
          setIsSyncing(false);
        }, (err) => {
          console.error("Listen Error:", err);
          setCloudStatus('error');
          setIsSyncing(false);
        });
      };

      const saveData = async (newMembers, newExpenses, newTripName) => {
        if (cloudStatus === 'offline') {
            localStorage.setItem('tripData', JSON.stringify({ members: newMembers, expenses: newExpenses, tripName: newTripName }));
            return;
        }

        if (dbRef.current) {
            setCloudStatus('connecting');
            const docRef = window.FirebaseAPI.doc(dbRef.current, 'trips', myAppId);
            try {
                await window.FirebaseAPI.setDoc(docRef, { members: newMembers, expenses: newExpenses, tripName: newTripName });
                setCloudStatus('synced');
            } catch (error) {
                console.error("Save Error:", error);
                setCloudStatus('error');
            }
        }
      };

      useEffect(() => {
        if (isEditingTripName && tripNameInputRef.current) tripNameInputRef.current.focus();
      }, [isEditingTripName]);

      const { totalTripCost, balances, settlements, memberDetails } = useMemo(() => {
        let total = 0;
        const memberStats = {};
        const details = {};

        members.forEach(m => {
          memberStats[m.id] = { id: m.id, name: m.name, paid: 0, share: 0, balance: 0 };
          details[m.id] = { paidItems: [], sharedItems: [] };
        });

        expenses.forEach(exp => {
          total += exp.amount;
          if (memberStats[exp.payerId]) {
            memberStats[exp.payerId].paid += exp.amount;
            details[exp.payerId].paidItems.push({ title: exp.title, amount: exp.amount });
          }
          const splitCount = exp.splitBetween.length;
          if (splitCount > 0) {
            const shareAmount = exp.amount / splitCount;
            exp.splitBetween.forEach(userId => {
              if (memberStats[userId]) {
                memberStats[userId].share += shareAmount;
                details[userId].sharedItems.push({ title: exp.title, totalAmount: exp.amount, splitCount, shareAmount });
              }
            });
          }
        });

        const balanceArray = Object.values(memberStats).map(stat => ({ ...stat, balance: stat.paid - stat.share }));
        const debtors = balanceArray.filter(b => b.balance < -0.01).map(b => ({ ...b, amount: Math.abs(b.balance) })).sort((a, b) => b.amount - a.amount);
        const creditors = balanceArray.filter(b => b.balance > 0.01).map(b => ({ ...b, amount: b.balance })).sort((a, b) => b.amount - a.amount);
        
        const transfers = [];
        let i = 0, j = 0;

        while (i < debtors.length && j < creditors.length) {
          const debtor = debtors[i];
          const creditor = creditors[j];
          const amount = Math.min(debtor.amount, creditor.amount);
          transfers.push({ fromId: debtor.id, fromName: debtor.name, toId: creditor.id, toName: creditor.name, amount: amount });
          debtor.amount -= amount; creditor.amount -= amount;
          if (debtor.amount < 0.01) i++;
          if (creditor.amount < 0.01) j++;
        }

        return { totalTripCost: total, balances: balanceArray, settlements: transfers, memberDetails: details };
      }, [expenses, members]);

      const handleSaveTripName = () => {
        let nameToSave = tripName;
        if (!tripName.trim()) { nameToSave = 'ทริปไม่ระบุชื่อ'; setTripName(nameToSave); }
        setIsEditingTripName(false);
        saveData(members, expenses, nameToSave);
      };

      const handleOpenExpenseModal = () => {
        if (members.length === 0) { alert("กรุณาเพิ่มสมาชิกก่อนครับ"); setActiveTab('members'); return; }
        setNewExpense({ title: '', amount: '', payerId: members[0]?.id || '', splitBetween: members.map(m => m.id) });
        setIsExpenseModalOpen(true);
      };

      const handleAddExpense = (e) => {
        e.preventDefault();
        if (!newExpense.title || !newExpense.amount || newExpense.splitBetween.length === 0) return;
        const newExpenseItem = { id: Date.now().toString(), title: newExpense.title, amount: parseFloat(newExpense.amount), payerId: newExpense.payerId, splitBetween: newExpense.splitBetween, date: new Date().toISOString() };
        const newExpenses = [...expenses, newExpenseItem];
        setExpenses(newExpenses);
        saveData(members, newExpenses, tripName);
        setIsExpenseModalOpen(false);
      };

      const handleDeleteExpense = (id) => setConfirmDialog({ isOpen: true, type: 'expense', id: id, message: 'ลบรายการนี้ใช่ไหม?' });

      const handleAddMember = (e) => {
        e.preventDefault();
        if (!newMemberName.trim()) return;
        const newId = Date.now().toString();
        const newMembers = [...members, { id: newId, name: newMemberName.trim() }];
        setMembers(newMembers);
        setNewExpense(prev => ({ ...prev, splitBetween: prev.splitBetween ? [...prev.splitBetween, newId] : [newId] }));
        setNewMemberName('');
        saveData(newMembers, expenses, tripName);
      };

      const handleDeleteMember = (id) => setConfirmDialog({ isOpen: true, type: 'member', id: id, message: 'ลบสมาชิกคนนี้ใช่ไหม?' });

      const executeDelete = () => {
        if (confirmDialog.type === 'expense') {
          const newExp = expenses.filter(e => e.id !== confirmDialog.id);
          setExpenses(newExp); saveData(members, newExp, tripName);
        } else if (confirmDialog.type === 'member') {
          const newMem = members.filter(m => m.id !== confirmDialog.id);
          const newExp = expenses.map(e => ({ ...e, splitBetween: e.splitBetween.filter(mid => mid !== confirmDialog.id) }));
          setMembers(newMem); setExpenses(newExp); saveData(newMem, newExp, tripName);
        }
        setConfirmDialog({ isOpen: false, type: '', id: '', message: '' });
      };

      const toggleSplitMember = (memberId) => {
        setNewExpense(prev => ({ ...prev, splitBetween: prev.splitBetween.includes(memberId) ? prev.splitBetween.filter(id => id !== memberId) : [...prev.splitBetween, memberId] }));
      };

      const formatMoney = (amount) => new Intl.NumberFormat('th-TH', { style: 'decimal', minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(amount);

      const MemberDetailModal = () => {
        if (!selectedMemberDetail) return null;
        const member = members.find(m => m.id === selectedMemberDetail);
        const stat = balances.find(b => b.id === selectedMemberDetail);
        const detail = memberDetails[selectedMemberDetail];
        if (!member || !stat || !detail) return null;

        return (
          <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-end md:items-center justify-center z-50 fade-in px-0 md:px-4">
            <div className="bg-white w-full max-w-lg md:rounded-2xl rounded-t-2xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
              <div className="bg-slate-50 border-b border-slate-100 p-4 flex justify-between items-center sticky top-0 z-10">
                <div>
                  <h3 className="text-xl font-bold text-slate-800">สรุปของ {member.name}</h3>
                  <p className={`text-sm font-medium ${stat.balance > 0 ? 'text-emerald-600' : stat.balance < 0 ? 'text-rose-600' : 'text-slate-500'}`}>{stat.balance > 0 ? `ได้เงินคืน ฿${formatMoney(stat.balance)}` : stat.balance < 0 ? `ต้องจ่าย ฿${formatMoney(Math.abs(stat.balance))}` : 'พอดี ไม่มียอดค้าง'}</p>
                </div>
                <button onClick={() => setSelectedMemberDetail(null)} className="p-2 bg-slate-200/50 rounded-full hover:bg-slate-200"><Icon name="x"/></button>
              </div>
              <div className="overflow-y-auto p-4 space-y-6">
                <section>
                  <h4 className="font-bold text-emerald-600 mb-3">จ่ายไปก่อน (฿{formatMoney(stat.paid)})</h4>
                  {detail.paidItems.length === 0 ? <p className="text-sm text-slate-400">ไม่มี</p> : detail.paidItems.map((item, i) => <div key={i} className="flex justify-between text-sm p-3 bg-emerald-50 rounded-lg mb-2"><span>{item.title}</span><span className="font-semibold text-emerald-700">฿{formatMoney(item.amount)}</span></div>)}
                </section>
                <section>
                  <h4 className="font-bold text-rose-600 mb-3">ส่วนแบ่งที่ต้องจ่าย (฿{formatMoney(stat.share)})</h4>
                  {detail.sharedItems.length === 0 ? <p className="text-sm text-slate-400">ไม่มี</p> : detail.sharedItems.map((item, i) => <div key={i} className="flex justify-between text-sm p-3 bg-rose-50 rounded-lg mb-2"><div><div>{item.title}</div><div className="text-xs text-slate-500">ยอด ฿{formatMoney(item.totalAmount)} (หาร {item.splitCount})</div></div><span className="font-semibold text-rose-700">฿{formatMoney(item.shareAmount)}</span></div>)}
                </section>
              </div>
            </div>
          </div>
        );
      };

      if (isSyncing && cloudStatus === 'connecting') {
        return <div className="min-h-screen flex items-center justify-center"><p className="text-slate-500">กำลังโหลด...</p></div>;
      }

      return (
        <div className="min-h-screen text-slate-800 pb-20 md:pb-6">
          <header className="bg-blue-600 text-white shadow-lg sticky top-0 z-30">
            <div className="max-w-3xl mx-auto px-4 py-4">
              <div className="flex justify-between items-center mb-4">
                <div className="flex items-center gap-3">
                  <div className="bg-white/20 p-2 rounded-xl"><Icon name="calculator"/></div>
                  <div>
                    <div className="flex items-center gap-2 mb-1">
                      <span className="text-xs text-blue-100">แชร์เงินทริป</span>
                      {cloudStatus === 'synced' ? <span className="text-[10px] bg-emerald-500/20 px-1.5 rounded-full">ออนไลน์</span> : cloudStatus === 'offline' ? <span className="text-[10px] bg-slate-500/50 px-1.5 rounded-full">ออฟไลน์</span> : <span className="text-[10px] bg-amber-500/20 px-1.5 rounded-full">ซิงค์...</span>}
                    </div>
                    {isEditingTripName ? <input ref={tripNameInputRef} value={tripName} onChange={e=>setTripName(e.target.value)} onBlur={handleSaveTripName} onKeyDown={e=>e.key==='Enter'&&handleSaveTripName()} className="bg-white/20 text-white border-b border-white outline-none font-bold text-xl w-32" /> : <h1 onClick={()=>setIsEditingTripName(true)} className="text-xl font-bold flex items-center gap-2 cursor-pointer">{tripName} <Icon name="edit-2" className="w-4 h-4 opacity-70"/></h1>}
                  </div>
                </div>
                <div className="text-right">
                  <p className="text-xs text-blue-100">ยอดรวม</p>
                  <p className="text-2xl font-black">฿{formatMoney(totalTripCost)}</p>
                </div>
              </div>

              <div className="hidden md:flex gap-1 bg-white/10 p-1 rounded-xl">
                {[{id:'summary', i:'wallet', l:'สรุปยอด'}, {id:'expenses', i:'receipt', l:`รายการ (${expenses.length})`}, {id:'members', i:'users', l:`สมาชิก (${members.length})`}].map(t => (
                  <button key={t.id} onClick={()=>setActiveTab(t.id)} className={`flex-1 py-2 rounded-lg text-sm font-medium flex items-center justify-center gap-2 ${activeTab===t.id?'bg-white text-blue-700':'text-white/80'}`}><Icon name={t.i}/> {t.l}</button>
                ))}
              </div>
            </div>
          </header>

          <main className="max-w-3xl mx-auto px-4 py-6">
            {activeTab === 'summary' && (
              <div className="space-y-6 fade-in">
                <div className="bg-white rounded-3xl shadow-sm border border-slate-200">
                  <div className="bg-slate-50 p-5 border-b border-slate-100 flex justify-between">
                    <h3 className="font-bold flex items-center gap-2"><Icon name="wallet" className="text-blue-500"/> สรุปการโอนเงิน</h3>
                  </div>
                  <div className="p-5">
                    {settlements.length === 0 ? <p className="text-center text-slate-400 py-4">ไม่มีรายการค้างชำระ</p> : settlements.map((s, i) => (
                      <div key={i} className="flex justify-between items-center p-4 bg-white border rounded-2xl mb-2">
                        <div className="flex items-center gap-3">
                          <span className="font-bold text-rose-600 text-right w-16 truncate">{s.fromName}</span>
                          <Icon name="arrow-right" className="text-slate-300"/>
                          <span className="font-bold text-emerald-600 w-16 truncate">{s.toName}</span>
                        </div>
                        <span className="font-black text-lg">฿{formatMoney(s.amount)}</span>
                      </div>
                    ))}
                  </div>
                </div>

                <div className="bg-white rounded-3xl shadow-sm border border-slate-200">
                  <div className="bg-slate-50 p-5 border-b border-slate-100"><h3 className="font-bold">สถานะของทุกคน</h3></div>
                  <div className="divide-y divide-slate-100">
                    {balances.map(b => (
                      <div key={b.id} onClick={()=>setSelectedMemberDetail(b.id)} className="p-5 flex flex-col md:flex-row md:items-center gap-4 cursor-pointer hover:bg-slate-50">
                        <div className="flex items-center gap-3 md:w-1/3">
                          <div className={`w-10 h-10 rounded-full flex items-center justify-center font-bold text-white ${b.balance>0?'bg-emerald-400':b.balance<0?'bg-rose-400':'bg-slate-300'}`}>{b.name[0]}</div>
                          <span className="font-bold text-lg">{b.name}</span>
                        </div>
                        <div className="flex-1 space-y-2">
                          <div className="flex justify-between text-sm"><span>จ่าย: ฿{formatMoney(b.paid)}</span><span>ส่วนแบ่ง: ฿{formatMoney(b.share)}</span></div>
                          <div className="h-2 bg-slate-100 rounded-full flex overflow-hidden">
                            {b.paid > 0 && <div className={`h-full ${b.balance>=0?'bg-emerald-400':'bg-slate-300'}`} style={{width:`${Math.min(100,(b.paid/Math.max(b.paid,b.share))*100)}%`}}/>}
                            {b.share > b.paid && <div className="h-full bg-rose-400 opacity-80" style={{width:`${((b.share-b.paid)/b.share)*100}%`}}/>}
                          </div>
                          <div className={`text-sm font-bold p-1 rounded inline-block ${b.balance>0?'text-emerald-600 bg-emerald-50':b.balance<0?'text-rose-600 bg-rose-50':'text-slate-500 bg-slate-100'}`}>{b.balance>0?`ได้คืน ฿${formatMoney(b.balance)}`:b.balance<0?`จ่ายเพิ่ม ฿${formatMoney(Math.abs(b.balance))}`:'พอดี'}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {activeTab === 'expenses' && (
              <div className="space-y-4 fade-in">
                <div className="flex justify-between items-center mb-4">
                  <h2 className="font-bold flex items-center gap-2"><Icon name="receipt" className="text-blue-500"/> รายการทั้งหมด</h2>
                  <button onClick={handleOpenExpenseModal} className="hidden md:flex bg-blue-600 text-white px-3 py-2 rounded-lg text-sm items-center gap-1"><Icon name="plus"/> เพิ่มรายการ</button>
                </div>
                <div className="grid md:grid-cols-2 gap-3">
                  {expenses.map((exp, i) => {
                    const payer = members.find(m => m.id === exp.payerId);
                    return (
                      <div key={exp.id} className="bg-white p-5 rounded-2xl border shadow-sm">
                        <div className="flex justify-between items-start mb-3">
                          <div>
                            <h4 className="font-bold text-lg">{exp.title}</h4>
                            <span className="text-xs bg-slate-100 px-2 py-1 rounded">จ่ายโดย: {payer?.name||'?'}</span>
                          </div>
                          <div className="font-black text-blue-600 text-lg">฿{formatMoney(exp.amount)}</div>
                        </div>
                        <div className="flex justify-between items-end border-t pt-3 mt-3">
                          <div className="text-sm">
                            <p className="text-slate-500">หาร {exp.splitBetween.length} คน</p>
                            <p className="text-rose-500 font-medium text-xs">ตกคนละ ฿{formatMoney(exp.amount/(exp.splitBetween.length||1))}</p>
                          </div>
                          <button onClick={()=>handleDeleteExpense(exp.id)} className="w-8 h-8 rounded-full bg-slate-100 text-slate-400 flex items-center justify-center hover:bg-rose-100 hover:text-rose-500"><Icon name="trash-2"/></button>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {activeTab === 'members' && (
              <div className="fade-in bg-white rounded-3xl border p-5">
                <h2 className="font-bold flex items-center gap-2 mb-4"><Icon name="users" className="text-blue-500"/> จัดการสมาชิก</h2>
                <form onSubmit={handleAddMember} className="flex gap-2 mb-6">
                  <input type="text" placeholder="พิมพ์ชื่อเพื่อน..." value={newMemberName} onChange={e=>setNewMemberName(e.target.value)} className="flex-1 border rounded-xl px-4 py-3 text-sm outline-none focus:border-blue-500" />
                  <button type="submit" disabled={!newMemberName.trim()} className="bg-blue-600 text-white px-6 rounded-xl disabled:bg-slate-300">เพิ่ม</button>
                </form>
                <div className="grid sm:grid-cols-2 gap-3">
                  {members.map(m => (
                    <div key={m.id} className="flex justify-between items-center p-4 bg-slate-50 border rounded-2xl">
                      <div className="flex-1 flex items-center gap-3 cursor-pointer" onClick={()=>setSelectedMemberDetail(m.id)}>
                        <div className="w-8 h-8 bg-blue-100 text-blue-600 rounded-full flex justify-center items-center font-bold">{m.name[0]}</div>
                        <span className="font-bold">{m.name}</span>
                      </div>
                      <button onClick={()=>handleDeleteMember(m.id)} className="p-2 text-slate-400 hover:text-rose-500"><Icon name="trash-2"/></button>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </main>

          {activeTab === 'expenses' && <button onClick={handleOpenExpenseModal} className="md:hidden fixed bottom-20 right-4 w-14 h-14 bg-blue-600 text-white rounded-full shadow-lg flex items-center justify-center z-40"><Icon name="plus" className="w-6 h-6"/></button>}

          <nav className="md:hidden fixed bottom-0 w-full bg-white border-t pb-safe z-40 flex h-16">
            {[{id:'summary',i:'wallet',l:'สรุป'}, {id:'expenses',i:'receipt',l:'รายการ'}, {id:'members',i:'users',l:'สมาชิก'}].map(t => (
              <button key={t.id} onClick={()=>setActiveTab(t.id)} className={`flex-1 flex flex-col items-center justify-center space-y-1 ${activeTab===t.id?'text-blue-600':'text-slate-400'}`}>
                <Icon name={t.i}/><span className="text-[10px] font-bold">{t.l}</span>
              </button>
            ))}
          </nav>

          {isExpenseModalOpen && (
            <div className="fixed inset-0 bg-slate-900/60 flex items-end md:items-center justify-center z-50 fade-in">
              <div className="bg-white w-full max-w-md md:rounded-3xl rounded-t-3xl overflow-hidden flex flex-col max-h-[90vh]">
                <div className="bg-blue-600 text-white p-4 flex justify-between items-center">
                  <h3 className="font-bold">เพิ่มรายการใหม่</h3>
                  <button onClick={()=>setIsExpenseModalOpen(false)}><Icon name="x"/></button>
                </div>
                <form onSubmit={handleAddExpense} className="p-5 space-y-4 overflow-y-auto pb-8">
                  <div>
                    <label className="block text-sm font-bold mb-1">ชื่อรายการ</label>
                    <input required value={newExpense.title} onChange={e=>setNewExpense({...newExpense, title: e.target.value})} className="w-full border rounded-xl px-4 py-3" />
                  </div>
                  <div>
                    <label className="block text-sm font-bold mb-1">ยอดเงิน (฿)</label>
                    <input type="number" required min="1" step="0.01" value={newExpense.amount} onChange={e=>setNewExpense({...newExpense, amount: e.target.value})} className="w-full border rounded-xl px-4 py-3 font-bold text-lg" />
                  </div>
                  <div>
                    <label className="block text-sm font-bold mb-1">คนสำรองจ่าย</label>
                    <select value={newExpense.payerId} onChange={e=>setNewExpense({...newExpense, payerId: e.target.value})} className="w-full border rounded-xl px-4 py-3">
                      {members.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}
                    </select>
                  </div>
                  <div>
                    <label className="block text-sm font-bold mb-2">หารใครบ้าง?</label>
                    <div className="grid grid-cols-2 gap-2">
                      {members.map(m => {
                        const sel = newExpense.splitBetween.includes(m.id);
                        return <button type="button" key={m.id} onClick={()=>toggleSplitMember(m.id)} className={`p-3 rounded-xl border text-left flex items-center gap-2 ${sel?'bg-blue-50 border-blue-500':'bg-white'}`}><div className={`w-4 h-4 rounded border flex items-center justify-center ${sel?'bg-blue-500 text-white':''}`}>{sel&&<Icon name="check" className="w-3 h-3"/>}</div><span className="text-sm font-bold truncate">{m.name}</span></button>
                      })}
                    </div>
                  </div>
                  <button type="submit" disabled={!newExpense.title||!newExpense.amount||!newExpense.splitBetween.length} className="w-full bg-blue-600 text-white py-4 rounded-xl font-bold mt-4 disabled:bg-slate-300">บันทึกรายการ</button>
                </form>
              </div>
            </div>
          )}

          <MemberDetailModal />
          
          {confirmDialog.isOpen && (
            <div className="fixed inset-0 bg-slate-900/60 flex items-center justify-center z-[60] px-4">
              <div className="bg-white rounded-3xl p-6 w-full max-w-sm text-center">
                <div className="w-16 h-16 bg-rose-100 text-rose-600 rounded-full flex items-center justify-center mx-auto mb-4"><Icon name="trash-2"/></div>
                <h3 className="text-xl font-bold mb-2">ยืนยันการลบ</h3>
                <div className="flex gap-3 mt-6">
                  <button onClick={()=>setConfirmDialog({isOpen:false})} className="flex-1 bg-slate-100 py-3 rounded-xl font-bold">ยกเลิก</button>
                  <button onClick={executeDelete} className="flex-1 bg-rose-600 text-white py-3 rounded-xl font-bold">ลบเลย</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
